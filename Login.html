<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MCS Spot - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Login Page Additional CSS */
        .login-wrapper {
            min-height: calc(100vh - 200px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: rgb(243, 235, 225);
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: 0.3s;
        }

        .login-card h1 {
            font-size: 28px;
            color: rgb(153, 41, 41);
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: 0.3s;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            border-color: rgb(153, 41, 41);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: rgb(153, 41, 41);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: rgb(180, 50, 50);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            margin-right: 12px;
        }

        .divider::after {
            margin-left: 12px;
        }

        .google-btn {
            width: 100%;
            padding: 11px;
            background: white;
            border: 1.5px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .google-btn:hover {
            background: #f8f8f8;
            border-color: rgb(153, 41, 41);
        }

        .signup-link {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: rgb(153, 41, 41);
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header-position">
        <h1>THE <i><span>MCS</span></i> SPOT</h1>
        <nav>
            <a href="Home.html">Home</a>
            <a href="Notes.html">Notes</a>
            <a href="Past-Papers.html">Past-Papers</a>
            <a href="Blog.html">Blogs</a>
            <a href="Events-Pic.html">Events</a>
            <a href="Community-Chat.html">Community Pages</a>
        </nav>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h1>Welcome Back!</h1>
            <p class="subtitle">Login to continue to THE MCS SPOT</p>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="student@example.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>

            <button class="login-btn" onclick="login(event)">Login</button>

            <div class="divider">Or continue with</div>

            <button class="google-btn" onclick="googleSignIn()">
                <span>🔵</span> Sign in with Google
            </button>

            <div class="signup-link">
                Don't have an account? <a href="Signup.html">Sign up now</a>
            </div>
        </div>
    </div>

    <script type="module" src="dashboard.js"></script>
</body>
</html>
