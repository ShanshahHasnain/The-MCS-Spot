<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The MCS Spot - Blogs</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Header -->
    <div class="header-position">
        <h1>THE <i><span>MCS</span></i> SPOT</h1>
        <nav>
            <a href="Home.html">Home</a>
            <a href="Notes.html">Notes</a>
            <a href="Past-Papers.html">Past-Papers</a>
            <a href="Blog.html" class="active">Blogs</a>
            <a href="Events-Pic.html">Events</a>
            <a href="Community-Chat.html">Community Pages</a>
        </nav>
    </div>

    <!-- Blog Header -->
    <div class="notes-header">
        <h1>Student Blogs</h1>
        <p>Share your experiences, study tips & stories</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search blogs by title or author...">
            <button onclick="searchBlogs()">Search</button>
        </div>
    </div>

    <!-- Blogs Container -->
    <div class="semester-section">
        <div id="blogsContainer" class="blogs-grid">
            <div class="loading">Loading blogs from Firebase...</div>
        </div>
    </div>

    <!-- Write Blog Section -->
    <div class="write-blog-section">
        <h2>Write a Blog</h2>
        <p>Share your thoughts, experiences, or study tips with your batch mates</p>

        <div class="blog-form">
            <input type="text" id="blogTitle" placeholder="Blog Title">
            <input type="text" id="blogAuthor" placeholder="Your Name">
            <textarea id="blogContent" placeholder="Write your blog content here..."></textarea>
            <button onclick="publishBlog()">Publish Blog</button>
            <div id="successMsg" class="success-msg">Blog published successfully!</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCGNckn0K7w2bqcsdHgZiE74qjQK-OdcYE",
            authDomain: "the-mcs-spot.firebaseapp.com",
            projectId: "the-mcs-spot",
            storageBucket: "the-mcs-spot.firebasestorage.app",
            messagingSenderId: "670130286214",
            appId: "1:670130286214:web:c480f810ac47d2e7d72b07"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let allBlogs = [];

        async function loadBlogs() {
            const container = document.getElementById('blogsContainer');
            container.innerHTML = '<div class="loading">Loading blogs from Firebase...</div>';

            try {
                const q = query(collection(db, "blogs"), orderBy("timestamp", "desc"));
                const querySnapshot = await getDocs(q);
                allBlogs = [];
                querySnapshot.forEach((doc) => {
                    allBlogs.push({ id: doc.id, ...doc.data() });
                });
                displayBlogs(allBlogs);
            } catch (error) {
                console.error("Error loading blogs:", error);
                container.innerHTML = '<div class="loading">Error loading blogs</div>';
            }
        }

        function displayBlogs(blogs) {
            const container = document.getElementById('blogsContainer');

            if (blogs.length === 0) {
                container.innerHTML = '<div class="loading">No blogs yet. Be the first to write!</div>';
                return;
            }

            let html = '';
            blogs.forEach(blog => {
                const date = blog.timestamp ? new Date(blog.timestamp).toLocaleDateString() : 'Unknown date';
                const shortContent = blog.content.length > 200 ? blog.content.substring(0, 200) + '...' : blog.content;
                
                html += `
                    <div class="blog-card" id="blog-${blog.id}">
                        <div class="blog-title">${escapeHtml(blog.title)}</div>
                        <div class="blog-meta">By: ${escapeHtml(blog.author)} | ${date}</div>
                        <div class="blog-content" id="content-short-${blog.id}">
                            ${escapeHtml(shortContent)}
                        </div>
                        <div class="blog-content-full" id="content-full-${blog.id}">
                            ${escapeHtml(blog.content)}
                        </div>
                `;
                
                if (blog.content.length > 200) {
                    html += `<button class="read-more-btn" onclick="window.toggleReadMore('${blog.id}')">Read More</button>`;
                }
                
                html += `
                        <div class="blog-footer">
                            <div class="like-section">
                                <button class="like-btn" onclick="window.likeBlog('${blog.id}', ${blog.likes || 0})">❤️</button>
                                <span class="like-count" id="likes-${blog.id}">${blog.likes || 0} likes</span>
                            </div>
                            <button class="delete-blog-btn" onclick="window.deleteBlog('${blog.id}')">Delete</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.toggleReadMore = function(blogId) {
            const shortContent = document.getElementById(`content-short-${blogId}`);
            const fullContent = document.getElementById(`content-full-${blogId}`);
            
            if (fullContent.classList.contains('show')) {
                fullContent.classList.remove('show');
                shortContent.style.display = 'block';
                event.target.textContent = 'Read More';
            } else {
                fullContent.classList.add('show');
                shortContent.style.display = 'none';
                event.target.textContent = 'Read Less';
            }
        };

        window.publishBlog = async function () {
            const title = document.getElementById('blogTitle').value;
            const author = document.getElementById('blogAuthor').value;
            const content = document.getElementById('blogContent').value;

            if (!title || !author || !content) {
                alert('Please fill Title, Author Name and Content');
                return;
            }

            const msgDiv = document.getElementById('successMsg');
            msgDiv.style.display = 'block';
            msgDiv.style.color = '#ffaa00';
            msgDiv.textContent = 'Publishing blog...';

            try {
                await addDoc(collection(db, "blogs"), {
                    title: title,
                    author: author,
                    content: content,
                    likes: 0,
                    timestamp: new Date().toISOString()
                });

                msgDiv.style.color = '#4caf50';
                msgDiv.textContent = 'Blog published successfully!';

                document.getElementById('blogTitle').value = '';
                document.getElementById('blogAuthor').value = '';
                document.getElementById('blogContent').value = '';

                await loadBlogs();

                setTimeout(() => {
                    msgDiv.style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error("Error publishing blog:", error);
                msgDiv.style.color = '#ff4444';
                msgDiv.textContent = 'Error publishing blog. Please try again';
            }
        };

        window.likeBlog = async function (blogId, currentLikes) {
            const newLikes = currentLikes + 1;
            const blogRef = doc(db, "blogs", blogId);
            await updateDoc(blogRef, { likes: newLikes });
            
            const blogIndex = allBlogs.findIndex(b => b.id === blogId);
            if (blogIndex !== -1) {
                allBlogs[blogIndex].likes = newLikes;
            }
            
            const likesSpan = document.getElementById(`likes-${blogId}`);
            if (likesSpan) {
                likesSpan.textContent = newLikes + ' likes';
            }
        };

        window.deleteBlog = async function (blogId) {
            if (confirm('Delete this blog?')) {
                await deleteDoc(doc(db, "blogs", blogId));
                await loadBlogs();
                alert('Blog deleted');
            }
        };

        window.searchBlogs = function () {
            const term = document.getElementById('searchInput').value.toLowerCase();
            if (!term) {
                displayBlogs(allBlogs);
                return;
            }
            const filtered = allBlogs.filter(blog => 
                blog.title.toLowerCase().includes(term) || 
                blog.author.toLowerCase().includes(term)
            );
            displayBlogs(filtered);
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function (m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        loadBlogs();
    </script>
</body>

</html>
